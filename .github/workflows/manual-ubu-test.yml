name: zManual Ubuntu test

on:
  workflow_dispatch: # manual trigger ability

jobs:
  setup:
    runs-on: ubuntu-slim
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          ref: aeon-branch
          path: .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full xvfb curl git

      - name: Install Chrome
        run: |
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb

      - name: Download 7-Zip installer with retry (Linux style)
        run: |
          url="https://www.7-zip.org/a/7z2301-linux-x64.tar.xz"
          out="7zip.tar.xz"
          maxAttempts=3
          delaySeconds=20

          for attempt in $(seq 1 $maxAttempts); do
            echo "=== Download attempt $attempt of $maxAttempts ==="
            if curl -fSL "$url" -o "$out"; then
              echo "Download succeeded."
              break
            else
              echo "** Attempt $attempt failed **"
              if [ $attempt -lt $maxAttempts ]; then
                echo "Retrying in $delaySeconds seconds..."
                sleep $delaySeconds
              else
                echo "** All $maxAttempts attempts failed for zip. Aborting. **"
                exit 1
              fi
            fi
          done

      - name: Start virtual display
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "Virtual display started"

      - name: Display system information
        run: |
          echo "Linux version:"
          uname -a
          echo "Python version:"
          python -V
          echo "IP address:"
          curl https://ipinfo.io/ip

      - name: Unzip .7z, copy categories and requirements
        run: |
          7z x runner-src/aeon_test.7z -p${{ secrets.ZIP_PW }}
          cp runner-src/requirements_b.txt .
          cp runner-src/aeon-categories* .

      - name: pip install
        run: pip install -r requirements_b.txt

      - name: Run script and validate output. With retry, timeout.
        timeout-minutes: 30
        run: |
          python aeon_sb_cdp_gui_003.py

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest changes before push
        run: git pull origin aeon-branch --rebase

      - name: Commit and push generated files
        run: |
          cp aout_test_cdp.csv raw_data/
          git add raw_data/aout_test_cdp.csv
          git commit -m "Testing: Add generated Aeon file" || echo "No changes to commit"
          git push origin aeon-branch
 
