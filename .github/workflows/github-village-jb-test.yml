name: Village JB test (gather-branch)

on:
  workflow_dispatch: # manual trigger ability

jobs:
  setup:
    runs-on: ubuntu-slim
    permissions:
      contents: write # Grant write permissions for pushing changes
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.7
        with:
          ref: gather-branch # Specify gather-branch directly for the primary checkout
          path: . # CHANGE: Checkout to the root of the runner's working directory      

      - name: Display system information
        run: |
          echo "Ubuntu version:"
          lsb_release -a
          echo "Python version"
          python -V
          echo "IP address"
          curl --no-progress-meter https://ipinfo.io/ip
          
      - name: Update package lists
        run: |
          sudo apt update
          apt list --upgradable        
        
      - name: Install basic utilities and 7-zip
        run: |
          sudo apt-get install -y \
            build-essential \
            python3-problem-report \
            linux-tools-common \
            linux-libc-dev \
            p7zip-full
              
      - name: Unzip gather-village-b.7z
        run: |
          7z x runner-src/gather-village-src.7z -p${{ secrets.ZIP_PW }}
          cp -v runner-src/village_paradigm_jb-categories.txt .
          cp -v runner-src/village_requirements.txt .
          ls -l

      - name: pip install
        run: pip install -r village_requirements.txt
          
      - name: Run script
        run: |
          echo "running script"
          python village_038_one_thread_args.py -c village_paradigm_jb-categories.txt -o village-gather-jb.csv
          echo "Error log:"
          cat village_error_log.txt 
          
      - name: Validate output file
        run: |
          FILE="village-gather-jb.csv"
          echo "Checking if $FILE exists and is larger than 100 KB..."
          if [ ! -f "$FILE" ]; then
            echo "❌ File does not exist: $FILE"
            exit 1
          fi
          FILESIZE=$(stat -c%s "$FILE")
          if [ "$FILESIZE" -lt 102400 ]; then
            echo "❌ File size is too small: ${FILESIZE} bytes"
            exit 1
          fi
          echo "✅ File exists and is larger than 100 KB: ${FILESIZE} bytes"

