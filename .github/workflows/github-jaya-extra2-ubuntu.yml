name: Jaya Extra1 flow (jaya-branch)

on:
  workflow_dispatch: # manual trigger ability
  schedule:
    # Run every day at (x:x AM PM UTC)
    - cron: '10 23 * * *' 

jobs:
  setup:
    runs-on: ubuntu-slim
    permissions:
      contents: write # Grant write permissions for pushing changes
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          ref: jaya-branch # Specify jaya-branch directly for the primary checkout
          path: . # CHANGE: Checkout to the root of the runner's working directory      
        
      - name: Display system information
        run: |
          echo "Ubuntu version:"
          lsb_release -a
          echo "Python version"
          python -V
          echo "IP address"
          curl --no-progress-meter https://ipinfo.io/ip
          
      - name: Update package lists
        run: |
          sudo apt update
          apt list --upgradable        
        
      - name: Install basic utilities and 7-zip
        run: |
          sudo apt-get install -y \
            build-essential \
            python3-problem-report \
            linux-tools-common \
            linux-libc-dev \
            p7zip-full
              
      - name: Unzip gather-jaya and settings files
        run: |
          7z x runner-src/gather-jaya-src.7z -p${{ secrets.ZIP_PW }}
          cp -v runner-src/jaya_subang_settings* .
          cp -v runner-src/jaya_requirements.txt .
          cp -v runner-src/jaya_fixer_subang_settings.ini .


      - name: Random delay
        run: |
          DELAY=$((RANDOM % 9))   # Random number between 0 and 8
          echo "Random sleep for $DELAY seconds..."
          sleep $DELAY

      - name: pip install
        run: pip install -r jaya_requirements.txt
          
      - name: Run script
        timeout-minutes: 60
        run: |
          echo "Install playwright chromium"
          python -m playwright install --with-deps --only-shell > /dev/null
          echo "running scripts"
          python jaya_pwright_2026_022_one_thread_arg.py -s jaya_subang_settings_4.json
          echo "Scripts done."

      - name: Validate output file
        run: |
          FILES=("jaya_subang_one_thread_4.csv")
          for FILE in "${FILES[@]}"; do
            echo "Checking if $FILE exists and is larger than 50 KB..."
            if [ ! -f "$FILE" ]; then
              echo "❌ File does not exist: $FILE"
              exit 1
            fi
            FILESIZE=$(stat -c%s "$FILE")
            if [ "$FILESIZE" -lt 50000 ]; then
              echo "❌ File size is too small: ${FILESIZE} bytes"
              exit 1
            fi
            echo "✅ File exists and is larger than 50 KB: ${FILESIZE} bytes"
          done
          echo "🎉 All files passed validation"

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest changes before push
        run: |
          git pull origin jaya-branch --rebase
    
      - name: Commit and push generated files
        run: |
          mkdir -p raw_data
          cp jaya_subang_one* raw_data/
          git add raw_data/jaya_subang_one*
          git commit -m "Automated: Add generated Jaya Subang files" || echo "No changes to commit"
          git push origin jaya-branch    
