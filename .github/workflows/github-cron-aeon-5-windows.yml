name: Aeon flow 5 (aeon-branch)

on:
  workflow_dispatch: # manual trigger ability
  schedule:
    # Run every day at 7:33 AM MY time (11:33 PM UTC)
    - cron: '33 23 * * *'     

jobs:
  setup:
    runs-on: windows-latest
    permissions:
      contents: write # Grant write permissions for pushing changes
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: aeon-branch # Specify aeon-branch directly for the primary checkout
          path: . # CHANGE: Checkout to the root of the runner's working directory      

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.12'

      - name: Download 7-Zip installer with retry
        shell: pwsh
        run: |
          $url = "https://www.7-zip.org/a/7z2301-x64.exe"
          $out = "7zip_installer.exe"
          $maxAttempts = 3
          $delaySeconds = 20

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Output "=== Download attempt $attempt of $maxAttempts ==="
            try {
              Invoke-WebRequest -Uri $url -OutFile $out
              Write-Output "Download succeeded."
              break
            } catch {
              Write-Output "** Attempt $attempt failed: $($_.Exception.Message) **"
              if ($attempt -lt $maxAttempts) {
                Write-Output "Retrying in $delaySeconds seconds..."
                Start-Sleep -Seconds $delaySeconds
              } else {
                Write-Error "** All $maxAttempts attempts failed for zip. Aborting. **"
                exit 1
              }
            }
          }

      - name: Install 7-Zip silently
        run: |
          Start-Process -FilePath ".\7zip_installer.exe" -ArgumentList "/S" -Wait

      - name: Add 7-Zip to PATH
        run: |
          $env:Path += ";C:\Program Files\7-Zip"
          echo "PATH updated"
        
      - name: Display system information
        run: |
          echo "Windows version:"
          systeminfo
          echo "Python version"
          python -V
          echo "IP address"
          curl https://ipinfo.io/ip
          
      - name: Set display resolution to 1920x1080
        run: powershell.exe -Command "Set-DisplayResolution -Width 1920 -Height 1080 -Force"
                       
      - name: Unzip .7z, copy categories and requirements
        run: |
          & "C:\Program Files\7-Zip\7z.exe" x runner-src/gather-aeon-src.7z -p${{ secrets.ZIP_PW }}
          Copy-Item "runner-src\requirements.txt" . -Verbose
          Copy-Item "runner-src\aeon-categories*" . -Verbose

      - name: pip install
        run: pip install -r requirements.txt
        
      - name: Ensure archived_logs dir exists
        shell: pwsh
        run: |
          if (!(Test-Path "archived_logs")) {
            New-Item -ItemType Directory -Path "archived_logs"
          }
          if (!(Test-Path "latest_logs")) {
            New-Item -ItemType Directory -Path "latest_logs"
          }   

      - name: Run script and validate output with retry
        shell: pwsh
        timeout-minutes: 120
        run: |
          function Check-OutputFile {
            param (
              [string]$FilePath,
              [int]$MinSize
            )
            if (-Not (Test-Path $FilePath)) {
              Write-Output "** Output file does not exist **"
              return $false
            }
            $filesize = (Get-Item $FilePath).Length
            if ($filesize -lt $MinSize) {
              Write-Output "** Output file is too small ($filesize bytes) **"
              return $false
            }
            Write-Output "Validation passed: output file seems OK."
            return $true
          }

          function Run-WithTimeout {
            param (
              [string]$Categories,
              [string]$Output,
              [int]$TimeoutMinutes,
              [string]$AttemptLabel
            )

            Write-Output "=== $AttemptLabel ==="
            $job = Start-Job -ScriptBlock {
              param($cats, $out)
              & python -u aeon_cdp_args_033.py -c $cats -o $out
            } -ArgumentList $Categories, $Output

            $timeoutSecs = $TimeoutMinutes * 60
            $finished = Wait-Job $job -Timeout $timeoutSecs

            if (-Not $finished) {
              Write-Output "** $AttemptLabel timed out after $TimeoutMinutes minutes. Stopping job. **"
              Stop-Job $job
              Remove-Job $job
              return $false
            }

            Receive-Job $job
            Remove-Job $job
            return (Check-OutputFile -FilePath $Output -MinSize 5000)
          }

          $perAttemptTimeout = 58  # minutes per attempt

          $isValid = Run-WithTimeout `
            -Categories "aeon-categories-5.txt" `
            -Output "aeon-out-part5.csv" `
            -TimeoutMinutes $perAttemptTimeout `
            -AttemptLabel "First attempt"

          if (-Not $isValid) {
            Write-Output "First attempt failed or timed out. Retrying after 15 seconds..."
            Start-Sleep -Seconds 15

            $isValid = Run-WithTimeout `
              -Categories "aeon-categories-5.txt" `
              -Output "aeon-out-part5.csv" `
              -TimeoutMinutes $perAttemptTimeout `
              -AttemptLabel "Second attempt"

            if (-Not $isValid) {
              Write-Error "** Retry failed. Aborting. **"
              exit 1
            }
          }

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest changes before push
        run: |
          git pull origin aeon-branch --rebase
         
      - name: Commit and push generated files
        run: |
          copy aeon-out-part5.csv raw_data/
          git add raw_data/aeon-out-part5.csv         
          git commit -m "Automated: Add generated Aeon file" || echo "No changes to commit"
          git push origin aeon-branch              
